services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orchestra-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orchestra
      POSTGRES_USER: orchestra
      POSTGRES_PASSWORD: orchestra_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestra"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (Fastify + Socket.IO) ──────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: orchestra-server
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://orchestra:orchestra_dev@postgres:5432/orchestra
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-generate-a-real-secret}
      BETTER_AUTH_URL: http://localhost:3001
      UI_ORIGIN: http://localhost:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
    container_name: orchestra-ui
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
    depends_on:
      server:
        condition: service_healthy

  # ── Database migrations (run once) ─────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: orchestra-migrate
    environment:
      DATABASE_URL: postgresql://orchestra:orchestra_dev@postgres:5432/orchestra
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy --schema=prisma/schema.prisma
    restart: "no"

volumes:
  pgdata:
