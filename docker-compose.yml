services:
  postgres:
    image: postgres:16-alpine
    container_name: orchestra-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orchestra
      POSTGRES_USER: orchestra
      POSTGRES_PASSWORD: orchestra_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestra"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
